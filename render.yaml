# Render deployment config — Free Web Service tier
# https://render.com/docs/yaml-spec
services:
  - type: web
    name: helix-api
    runtime: python
    plan: free  # 512MB RAM, sleeps after 15min idle
    region: singapore  # closest to Indonesia
    rootDir: .  # repo root saat deploy = helix/
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false  # set manual di Render dashboard
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: PYTHON_VERSION
        value: 3.11.10
    healthCheckPath: /
